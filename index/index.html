<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Game Seru</title>
    
    <style>
        /* Mengatur font dan margin dasar */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f4f9;
            color: #333;
        }

        header {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 20px;
            margin-bottom: 20px;
        }

        /* Mengatur wadah game agar berjejer rapi */
        .game-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        /* Desain kartu untuk masing-masing game */
        .game-card {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            width: 300px;
            transition: transform 0.2s;
        }

        .game-card:hover {
            transform: scale(1.05);
        }

        .game-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .game-info {
            padding: 15px;
            text-align: center;
        }

        .game-info h3 {
            margin-bottom: 10px;
        }

        .game-info p {
            color: #777;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .game-info button {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        .game-info button:hover {
            background-color: #c0392b;
        }
    </style>
    </head>
<body>

    <header>
        <h1>Portal Game Seru</h1>
        <p>Mainkan game favoritmu di sini!</p>
    </header>

    <main class="game-container">
        <div class="game-card">
            <img src="https://via.placeholder.com/300x150" alt="Thumbnail Game Mario">
            <div class="game-info">
                <h3>Petualangan Mario</h3>
                <p>Kategori: Action</p>
                <button>Mainkan Sekarang</button>
            </div>
        </div>

        <div class="game-card">
            <img src="https://via.placeholder.com/300x150" alt="Thumbnail Game Puzzle">
            <div class="game-info">
                <h3>Teka-Teki Silang</h3>
                <p>Kategori: Puzzle</p>
                <button>Mainkan Sekarang</button>
            </div>
        </div>
        
        <div class="game-card">
            <img src="https://via.placeholder.com/300x150" alt="Thumbnail Game Balapan">
            <div class="game-info">
                <h3>Balap Mobil Cepat</h3>
                <p>Kategori: Racing</p>
                <button>Mainkan Sekarang</button>
            </div>
        </div>
    </main>

</body>
</html>
